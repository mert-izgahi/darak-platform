# .github/workflows/ci.yml

name: Darak CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 app/ run.py --max-line-length=100

  # ─────────────────────────────────────────
  # JOB 2: Test
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-bytes
      MONGODB_URI: mongodb://localhost:27017/darak_test?uuidRepresentation=standard
      CLOUDINARY_CLOUD_NAME: fake
      CLOUDINARY_API_KEY: fake
      CLOUDINARY_API_SECRET: fake

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────
  # JOB 3: Deploy (placeholder)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "✅ All checks passed. Deploy step coming in Phase 7."